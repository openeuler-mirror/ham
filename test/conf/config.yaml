---
version: 1.0.0

project:
  name: "ham_dt"
  desc: "ham_dt project"
  prod: null
  team: null

pipeline:
  build:
    - task: "cmake_test"
  run:
    - task: "run_test"
  report:
    - task: "lcov_report"
      exec: "mkdir -p ../build/gcovr_report;pwd;lcov --d ../.. --c --output-file ../build/test.info --rc lcov_branch_coverage=1;lcov -e ../build/test.info \"*/HAM/src/*\" -output-file ../build/coverage.info --rc lcov_branch_coverage=1;genhtml -o ../build/gcovr_report ../build/coverage.info --show-details --legend --rc lcov_branch_coverage=1"
      args: false
  clean:
    - task: "clean_target"

components:
  - type: "hdt_cmc_c_cpp"
    repo: null
    dest: null
    manifest:
      gtest: null
      mockcpp: null
      gcov: null
      # asan: null